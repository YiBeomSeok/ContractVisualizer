name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify gradle.properties version matches tag
        run: |
          PROP_VERSION=$(./gradlew -q properties --property pluginVersion | awk -F': ' '/^pluginVersion: /{print $2}')
          TAG_VERSION="${{ steps.version.outputs.value }}"
          if [ "$PROP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pluginVersion in gradle.properties ($PROP_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(./gradlew getChangelog --no-header --no-summary --quiet)
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${{ steps.version.outputs.value }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            build/distributions/*.zip

      - name: Publish plugin to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        if: env.PUBLISH_TOKEN != ''
        run: ./gradlew publishPlugin --stacktrace
